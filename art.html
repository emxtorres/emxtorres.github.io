<script>
  const h=document.documentElement,b=document.getElementById('tb');
  function t(d){d?h.setAttribute('data-dark',''):h.removeAttribute('data-dark');b.textContent=d?'☀':'☽';localStorage.setItem('dark',d)}
  const s=localStorage.getItem('dark');
  t(s!==null?s==='true':window.matchMedia('(prefers-color-scheme:dark)').matches);
  b.onclick=()=>t(!h.hasAttribute('data-dark'));
   const burger = document.getElementById('burger');
const navList = document.querySelector('.nav-links');
burger.addEventListener('click', () => {
  const open = burger.classList.toggle('open');
  navList.classList.toggle('open');
  burger.setAttribute('aria-expanded', open);
});
navList.querySelectorAll('a').forEach(a =>
  a.addEventListener('click', () => {
    burger.classList.remove('open');
    navList.classList.remove('open');
  })
);
</script>
